name: Refresh FastF1 Replay Bundles

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/fastf1-replay.yml"
      - "scripts/build_fastf1_race_data.py"
  schedule:
    - cron: "15 * * * *"
  workflow_dispatch:

concurrency:
  group: fastf1-replay-refresh
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  refresh-fastf1-bundles:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-fastf1-${{ hashFiles('scripts/build_fastf1_race_data.py') }}
          restore-keys: |
            ${{ runner.os }}-pip-fastf1-

      - name: Cache FastF1
        uses: actions/cache@v4
        with:
          path: .cache/fastf1
          key: ${{ runner.os }}-fastf1-cache-${{ hashFiles('scripts/build_fastf1_race_data.py') }}
          restore-keys: |
            ${{ runner.os }}-fastf1-cache-

      - name: Install FastF1
        run: |
          python -m pip install --upgrade pip
          python -m pip install fastf1 pandas

      - name: Ensure FastF1 cache directory
        run: mkdir -p .cache/fastf1

      - name: Generate completed-race bundles
        run: python scripts/build_fastf1_race_data.py --season 2026 --completed

      - name: Commit updated bundles
        run: |
          if git diff --quiet -- public/data/fastf1; then
            echo "No FastF1 replay changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/fastf1
          git commit -m "chore: refresh FastF1 replay bundles"
          git pull --rebase origin main
          git push origin HEAD:main
